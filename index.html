<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang chuyển hướng...</title>
  
  <!-- Tự động chuyển hướng bằng Meta Refresh -->
  <meta http-equiv="refresh" content="0; url=https://gg8853.com/">
  
  <!-- Thẻ Canonical -->
  <link rel="canonical" href="https://gg8853.com/">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 20px;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #58a6ff;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 10px;
      color: #f0f6fc;
    }
    p {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 20px;
    }
    a {
      color: #58a6ff;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>

  <!-- Tự động chuyển hướng bằng JavaScript -->
  <script type="text/javascript">
    window.location.replace("https://gg8853.com/");
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Đang chuyển hướng đến trang web yêu cầu</h1>
    <p>Vui lòng đợi trong giây lát...</p>
    <p>Nếu bạn không được chuyển hướng tự động, <a href="https://gg8853.com/">nhấp vào đây để tiếp tục</a>.</p>
  </div>
</body>
</html>
